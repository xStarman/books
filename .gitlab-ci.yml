stages:
  - build
  - test
  - deploy

build_front:
  stage: build
  image: node:20-alpine
  rules:
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml
  script:
    - echo "Build frontend"
    - cd frontend
    - npm install
    - npm run build

test_back:
  stage: test
  image: lorisleiva/laravel-docker:8.4
  services:
    - postgres:16-alpine
  variables:
    POSTGRES_DB: books
    POSTGRES_USER: sail
    POSTGRES_PASSWORD: password
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: 5432
    DB_DATABASE: books
    DB_USERNAME: sail
    DB_PASSWORD: password
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml
  script:
    - echo "Testes backend"
    - cd backend
    - cp .env.example .env || true
    - composer install
    - php artisan key:generate
    - php artisan migrate --force
    - php artisan test

deploy_front:
  stage: deploy
  image: docker:cli
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - frontend/**/*
        - docker-compose.prod.yml
        - .gitlab-ci.yml
  script:
    - echo "Deploy Frontend"
    - cp "$FRONTEND_ENV_PROD" frontend/.env.prod
    - docker compose -f docker-compose.prod.yml up -d --build frontend

deploy_back:
  stage: deploy
  image: docker:cli
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/**/*
        - docker-compose.prod.yml
        - .gitlab-ci.yml
  script:
    - echo "Deploy Backend"
    - cp "$BACKEND_ENV_PROD" backend/.env.prod
    - docker compose -f docker-compose.prod.yml up -d --build api pgsql
